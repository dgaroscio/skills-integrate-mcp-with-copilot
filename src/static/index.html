<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <div>
          <h1>Mergington High School</h1>
          <h2>Extracurricular Activities</h2>
        </div>
        <div class="user-section">
          <button id="user-btn" class="user-btn">👤</button>
          <div id="user-menu" class="user-menu hidden">
            <div id="login-section">
              <div class="form-group">
                <label for="login-username">Username:</label>
                <input type="text" id="login-username" placeholder="Teacher username" />
              </div>
              <div class="form-group">
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" placeholder="Password" />
              </div>
              <button id="login-btn" class="login-btn">Login</button>
            </div>
            <div id="logout-section" class="hidden">
              <p>Logged in as: <strong id="logged-user"></strong></p>
              <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container" class="hidden">
        <h3>Register Student for Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="student-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Register Student</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>

      <section id="login-prompt" class="login-prompt">
        <p>👤 Please login as a teacher to manage registrations.</p>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
